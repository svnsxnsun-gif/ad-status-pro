<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad-Status PRO v5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/markdown-it@13.0.1/dist/markdown-it.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-4xl mx-auto text-center">
        <h1 class="text-4xl font-black text-blue-600 mb-8">Ad-Status PRO v5</h1>
        <div class="bg-white p-8 rounded-3xl shadow-lg border border-slate-100 mb-10">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <input type="text" id="domain" placeholder="도메인" class="border p-4 rounded-xl outline-none">
                <input type="text" id="industry" placeholder="업종" class="border p-4 rounded-xl outline-none">
                <input type="text" id="keywords" placeholder="키워드" class="border p-4 rounded-xl outline-none">
            </div>
            <button onclick="run()" id="btn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl">리포트 생성</button>
        </div>
        <div id="loading" class="hidden py-10 font-bold">전략 분석 중...</div>
        <div id="resultBox" class="hidden bg-white p-8 rounded-3xl shadow-lg text-left prose max-w-none">
            <div id="content"></div>
        </div>
    </div>

    <script>
        async function run() {
            const domain = document.getElementById('domain').value;
            if(!domain) return alert('도메인 필수!');
            
            document.getElementById('btn').disabled = true;
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('resultBox').classList.add('hidden');

            try {
                // 내 서버(Vercel API)로 요청을 보냅니다.
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        domain, 
                        industry: document.getElementById('industry').value,
                        keywords: document.getElementById('keywords').value
                    })
                });
                const data = await res.json();
                const md = window.markdownit();
                document.getElementById('content').innerHTML = md.render(data.text);
                document.getElementById('resultBox').classList.remove('hidden');
            } catch (e) {
                alert('에러 발생!');
            } finally {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('btn').disabled = false;
            }
        }
    </script>
</body>
</html>
